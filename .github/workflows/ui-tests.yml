name: UI tests (emulator)

# On-demand only: never runs on a normal push. Trigger it either from the
# Actions tab ("Run workflow"), or by including [uitest] in a commit message.
on:
  workflow_dispatch:
  push:
    branches: ["**"]

concurrency:
  group: uitests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: Instrumented UI tests + screenshots
    runs-on: ubuntu-latest
    # Skip unless explicitly requested.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[uitest]')
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Hardware acceleration so the emulator boots fast enough.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --console=plain

      # Combine instrumented (.ec) + unit (.exec) coverage into one report and
      # gate it at 90%. The gate is non-blocking for now while we climb to 90%
      # with added tests; flip off continue-on-error once the baseline clears it.
      - name: Unit tests (for merged coverage)
        if: always()
        run: ./gradlew :app:testDebugUnitTest --console=plain
      - name: Merged coverage report
        if: always()
        run: ./gradlew :app:jacocoTestReport --console=plain
      - name: Merged coverage gate (>= 90%)
        if: always()
        continue-on-error: true
        run: ./gradlew :app:jacocoCoverageVerification --console=plain
      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-merged-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport
          if-no-files-found: warn

      # Screenshots written to Test Storage are pulled here by AGP.
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: app/build/outputs/connected_android_test_additional_output/**
          if-no-files-found: warn

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected/**
          if-no-files-found: warn

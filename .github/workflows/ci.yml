name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core logic tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run :core tests + coverage gate
        # jacocoTestCoverageVerification depends on test, so this runs the suite
        # and then fails if instruction coverage drops below the floor (0.80).
        run: ./gradlew :core:jacocoTestCoverageVerification :core:jacocoTestReport --console=plain
      - name: Upload core test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-report
          path: core/build/reports/tests/test
      - name: Upload core coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage-report
          path: core/build/reports/jacoco/test

  android-build:
    name: Android build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: App unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --console=plain
      # Exercise R8/minify on the release build (no signing secret on CI, so the
      # APK comes out unsigned — that's fine; the point is to catch ProGuard
      # breakage against Room / kotlinx-serialization / Glance before a release.
      - name: Assemble release APK (R8 check, unsigned)
        run: ./gradlew :app:assembleRelease --console=plain
      - name: Lint
        run: ./gradlew :app:lintDebug --console=plain
      - name: App coverage report
        if: always()
        run: ./gradlew :app:jacocoTestReport --console=plain
      - name: Upload app coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: questloop-debug-apk
          path: app/build/outputs/apk/debug/*.apk
      # Coverage gate. Temporarily non-blocking while the :app gate's scope is
      # finalized: the whole module is dominated by Compose UI that only the
      # emulator tests exercise, so a 90% JVM-unit gate over everything isn't
      # meaningful. Reports the number; doesn't fail the job yet.
      - name: App coverage gate (>= 90%)
        continue-on-error: true
        run: ./gradlew :app:jacocoCoverageVerification --console=plain

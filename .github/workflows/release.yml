name: Release

# Publishes a downloadable APK to a GitHub Release.
# Triggers:
#   - pushing a tag like v0.1.0 / v0.1.0-experimental
#   - manual run (Actions tab) with an optional tag input
on:
  push:
    tags: ["v*"]
    # Cutting a release from the trunk/dev branch: include "[release]" in the
    # commit message. (Tags can't be pushed from the dev sandbox, so the workflow
    # creates the tag + release server-side using GITHUB_TOKEN.)
    branches: ["main", "claude/**"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.5.0)"
        required: true
        default: "v0.5.0"

permissions:
  contents: write

jobs:
  release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    # On branch pushes, only run when the commit explicitly asks for a release.
    if: >-
      github.event_name != 'push' ||
      startsWith(github.ref, 'refs/tags/') ||
      contains(github.event.head_commit.message, '[release]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            T="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            T="${{ github.ref_name }}"
          else
            T="v0.5.0"
          fi
          echo "value=$T" >> "$GITHUB_OUTPUT"

      # Run the core test gate before shipping anything.
      - name: Core tests
        run: ./gradlew :core:test --console=plain

      # Gate on the app unit suite + lint too: full-tests.yml only runs AFTER a
      # release is published, so without these a red app suite (Robolectric
      # break, a SCHEMA_VERSION bump missing its exported schema/Migration —
      # SchemaExportTest runs here — or a lint error) could ship in the APK.
      - name: App unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain
      - name: Lint
        run: ./gradlew :app:lintDebug --console=plain

      # Decode the release keystore from secrets when present. The build signs
      # with it; without the secret we fall back to a debug-signed APK so the
      # workflow still produces an installable artifact.
      - name: Decode release keystore
        id: keystore
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_KEYSTORE_BASE64 not set — building an unsigned debug APK."
          fi

      - name: Build signed release APK
        if: steps.keystore.outputs.signed == 'true'
        env:
          RELEASE_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Build debug APK (no signing secret)
        if: steps.keystore.outputs.signed != 'true'
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Stage APK and release notes
        run: |
          mkdir -p dist
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "dist/questloop-${{ steps.tag.outputs.value }}.apk"
            # Keep R8's mapping file with the release: without it, obfuscated
            # stack traces from this build are permanently un-retraceable.
            cp app/build/outputs/mapping/release/mapping.txt \
               "dist/questloop-${{ steps.tag.outputs.value }}-mapping.txt"
            SIGNING="release-signed"
            SIGN_NOTE="Release-signed with QuestLoop's own key (not Play App Signing); you may still see an \"unknown app\" warning when sideloading."
          else
            cp app/build/outputs/apk/debug/app-debug.apk \
               "dist/questloop-${{ steps.tag.outputs.value }}.apk"
            SIGNING="debug-signed"
            SIGN_NOTE="Debug-signed (no release keystore was configured); you may see an \"unknown app\" warning."
          fi
          ls -lh dist
          cat > "$RUNNER_TEMP/notes.md" <<EOF
          ## QuestLoop — experimental build

          A downloadable, **$SIGNING** APK for sideloading and trying the app.
          This is an early experimental build, not a production release.

          ### Install
          1. Download the \`.apk\` below to your Android device (Android 8.0 / API 26+).
          2. Allow installing from unknown sources for your browser/files app.
          3. Open the APK to install.

          ### Notes
          - $SIGN_NOTE
          - Switching signing keys means an existing install signed with a
            different key must be uninstalled before this one will install.
          - All data is stored locally on your device.
          - QuestLoop never holds, moves, or invests money — see the in-app
            Rewards screen and the docs for details.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: QuestLoop ${{ steps.tag.outputs.value }} (experimental)
          prerelease: true
          generate_release_notes: false
          body_path: ${{ runner.temp }}/notes.md
          # The R8 mapping.txt only exists on the signed (minified) path; the
          # unmatched pattern is harmless on debug-signed builds.
          files: |
            dist/*.apk
            dist/*-mapping.txt

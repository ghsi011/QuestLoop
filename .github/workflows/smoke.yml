name: Smoke

# Fast PR/push gate: core logic tests only — no Android build, no emulator —
# so every push gets a quick green/red in ~1 minute. The heavier work (app
# build + lint, instrumented UI tests, merged UI coverage) lives in
# full-tests.yml, which runs manually, nightly, and on release.
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    uses: ./.github/workflows/core-tests.yml

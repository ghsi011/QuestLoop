name: Export Room schema

# Generates the Room schema JSON (exportSchema=true) by building :app, then
# commits app/schemas back to the branch. Run after a Room version bump so the
# next migration has a committed baseline to author/test against.
# It pushes a commit, so it only runs when explicitly asked: include "[schema]"
# in the commit message (or use the manual run on the default branch). The bot's
# own commit message has no "[schema]" marker, so it never re-triggers itself.
on:
  push:
    branches: ["main", "claude/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-room-schema-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-schema:
    name: Generate and commit Room schema
    runs-on: ubuntu-latest
    # On a push, only run when the commit explicitly asks for it.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[schema]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # Building debug runs the Room KSP processor, which writes the schema to
      # app/schemas/<database>/<version>.json (room.schemaLocation in build.gradle.kts).
      - name: Generate schema
        run: ./gradlew :app:assembleDebug --console=plain
      - name: Commit schema if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/schemas
          if git diff --cached --quiet; then
            echo "No Room schema changes to commit."
          else
            git commit -m "Export Room schema (CI)

          Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
            git push
          fi
